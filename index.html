<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Skin Intel Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <video id="bgVideo" autoplay muted loop playsinline>
  <source src="BG_VIDEO/bg_video (1).mp4" type="video/mp4" />
</video> 

  <div class="hamburger" id="hamburgerBtn">&#9776;</div>

  <div class="intro">
    <div class="new__bg">
      <div class="hello__div">

      </div>
      <script>
        const hello = document.querySelector(".hello__div");
        setInterval(hello__function, 20000);
        function hello__function() {
          hello.style.display = "none";
          setTimeout(function () {
            hello.style.display = "flex";
          }, 10);
        }
      </script>
    </div>
    </p>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <h2>Skin Intel Bot</h2>

      <!-- Scrollable history box -->
      <section class="sb-history">
        <div id="historyList"></div>
        <button id="clearHistoryBtn" class="del-btn" title="Clear all">🗑️ Clear all</button>
      </section>



    </div>
  </aside>

  <!--  HEADER START -->
  <header class="chat-header">
    <div class="notch-bar">
      <div class="header-left">
        <h1 class="header-title">Skin Intel Bot</h1>

      </div>
  </header>

  <!--  HEADER END -->


  <main class="chat-section">
    <div id="chatBox" class="chat-box">
      <div class="bot-message">
        Hello! I’m your Skin Intel Bot <br> Type something to get started with......💬<br><br><strong>Note:</strong>For
        personalized advice, always consult a dermatologist.
      </div>

    </div>


    <div class="input-area-container">
      <div id="imagePreview" class="image-preview"></div>
      <div class="input-area">
        <button id="hospitalBtn" class="hospital-btn" title="Find nearby skin hospitals">
          <div class="hospital-bag">
            <div class="bag-handle"></div>
            <div class="bag-body">
              <span class="bag-cross">+</span>
            </div>
          </div>
        </button>

        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
        <label for="imageInput" class="image-btn" title="Attach image">➕</label>
        <input id="imageInput" type="file" accept="image/*" style="display:none;" />
        <button id="sendBtn" type="button">➤</button>
      </div>
    </div>

  </main>

  <!--  Popup for history preview -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close-btn">&times;</span>
      <h3>Chat Preview</h3>
      <div class="popup-body">
        <p><strong>You:</strong> <span id="popupUser"></span></p>
        <p><strong>Bot:</strong> <span id="popupBot"></span></p>
      </div>
    </div>
  </div>

  <!-- HOSPITAL BANNER -->
<!-- 🔒 Privacy Banner -->
<div id="privacyBanner" class="privacy-banner">
  <div class="privacy-msg">
    🔒 This action needs your location to find nearby skin hospitals.
  </div>

  <div class="privacy-actions">
    <button id="privacyCancel" class="privacy-btn cancel">Cancel</button>
    <button id="privacyContinue" class="privacy-btn continue">Continue</button>
  </div>
</div>








  <!-- Load Markdown parser first -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Then load your main chat logic -->
  <script src="script.js"></script>


</body>

</html>
